<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runa — Norse / Celestial Preview</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <header>
    <strong>Runa Preview</strong>
    <button class="theme-toggle" id="themeToggle" aria-live="polite">
      Switch to Celestial
    </button>
  </header>

  <main>
    <section class="mode-card" aria-labelledby="modeHeading">
      <p class="eyebrow">Interactive prototype</p>
      <h1 id="modeHeading">Norse Mode</h1>
      <p id="modeDescription">A grounded dark theme inspired by stone, iron, and firelight.</p>
      <div class="sigil" aria-hidden="true">ᚱ</div>
      <p class="hint">Tip: press <kbd>T</kbd> to toggle themes.</p>
    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
